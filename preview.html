<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Arquitecto — Inicio</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #111;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 40px 20px 60px;
      gap: 20px;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    }

    .etiqueta {
      color: #555;
      font-size: 0.7rem;
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    /* ── CUERPO DEL TELÉFONO ── */
    .phone-outer {
      width: 393px;
      height: 852px;
      background: #1c1c1e;
      border-radius: 52px;
      padding: 14px;
      box-shadow:
        inset 0 0 0 1px #3a3a3c,
        0 0 0 1px #000,
        0 50px 120px rgba(0,0,0,0.9),
        0 20px 40px rgba(0,0,0,0.6);
      position: relative;
      flex-shrink: 0;
    }

    /* Botón de silencio (izquierda) */
    .phone-outer::before {
      content: '';
      position: absolute;
      left: -3px;
      top: 130px;
      width: 3px;
      height: 32px;
      background: #2c2c2e;
      border-radius: 2px 0 0 2px;
      box-shadow: 0 46px 0 #2c2c2e, 0 90px 0 #2c2c2e;
    }

    /* Botón de encendido (derecha) */
    .phone-outer::after {
      content: '';
      position: absolute;
      right: -3px;
      top: 170px;
      width: 3px;
      height: 60px;
      background: #2c2c2e;
      border-radius: 0 2px 2px 0;
    }

    /* Pantalla */
    .phone-screen {
      width: 100%;
      height: 100%;
      border-radius: 40px;
      overflow: hidden;
      background: #fff;
      position: relative;
    }

    /* Dynamic island */
    .dynamic-island {
      position: absolute;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      width: 118px;
      height: 34px;
      background: #000;
      border-radius: 20px;
      z-index: 10;
      pointer-events: none;
    }

    /* Indicador home */
    .home-bar {
      position: absolute;
      bottom: 8px;
      left: 50%;
      transform: translateX(-50%);
      width: 130px;
      height: 5px;
      background: rgba(0,0,0,0.25);
      border-radius: 3px;
      z-index: 10;
      pointer-events: none;
    }

    .phone-screen iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    /* ── CONTROLES ── */
    .controles {
      display: flex;
      gap: 12px;
    }

    .btn-ctrl {
      background: #222;
      border: 1px solid #333;
      color: #888;
      font-size: 0.68rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 10px 20px;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      font-family: inherit;
    }

    .btn-ctrl:hover {
      background: #333;
      color: #ccc;
    }

    /* ── EN PANTALLA CHICA (celular real) ── */
    @media (max-width: 500px) {
      body {
        padding: 0;
        background: #000;
        justify-content: center;
        align-items: center;
        height: 100svh;
        overflow: hidden;
      }
      .etiqueta,
      .controles { display: none; }
      .phone-outer {
        width: 100vw;
        height: 100svh;
        border-radius: 40px;
        padding: 10px;
        box-shadow: none;
      }
      .phone-outer::before,
      .phone-outer::after { display: none; }
      .phone-screen {
        border-radius: 32px;
      }
    }
  </style>
</head>
<body>

  <span class="etiqueta">iPhone 14 — 390 × 844 px</span>

  <div class="phone-outer">
    <div class="phone-screen">
      <div class="dynamic-island"></div>
      <iframe id="vistaIframe" src="index-mobile.html" title="Vista móvil"></iframe>
      <div class="home-bar"></div>
    </div>
  </div>

  <div class="controles">
    <button class="btn-ctrl" onclick="document.getElementById('vistaIframe').src='index-mobile.html'">
      Recargar
    </button>
    <button class="btn-ctrl" onclick="document.getElementById('vistaIframe').src='index-mobile.html'">
      Inicio
    </button>
  </div>

</body>
</html>
